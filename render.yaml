# Render Blueprint — deploy HR PRO free from GitHub.
# In Render: New +  ->  Blueprint  ->  pick the Sanhaphoj/hr-pro repo.
# Free plan, Docker runtime, SQLite (no separate database needed).
services:
  - type: web
    name: hr-pro
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: "HR PRO"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: Asia/Bangkok
      # APP_KEY is auto-generated by the container on first boot (a valid
      # base64 key). For login sessions that survive redeploys, set a fixed
      # APP_KEY in the Render dashboard: run `php artisan key:generate --show`
      # locally and paste the resulting "base64:..." value here.
      #
      # Set APP_URL to your service URL after the first deploy
      # (e.g. https://hr-pro.onrender.com) for correct absolute links.
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
