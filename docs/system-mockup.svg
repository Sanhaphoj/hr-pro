    <text x="92" y="50" fill="#1f2937" font-size="24" font-weight="700">HR PRO — ภาพรวมการทำงานของระบบ</text>
    <text x="92" y="71" fill="#5b6675" font-size="13">ระบบบริหารทรัพยากรบุคคลสำหรับองค์กรขนาดใหญ่ · Laravel · Corporate UI</text>
  </g>

  <!-- ================= Screen 1 — Login ================= -->
