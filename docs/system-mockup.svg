    <text x="926" y="466" fill="#15803d" font-weight="700">4 · อัปเดต & แจ้งเตือน</text>
    <text x="926" y="485" fill="#3f7d57" font-size="10">ยอดวันลาเปลี่ยน · แจ้งพนักงาน</text>
