    <rect x="230" y="596" width="170" height="28" rx="8" fill="#fff" stroke="#e3e8ef"/><text x="315"  y="614" fill="#1e3a5f">ประกาศ</text>
    <rect x="420" y="596" width="170" height="28" rx="8" fill="#fff" stroke="#e3e8ef"/><text x="505"  y="614" fill="#1e3a5f">ผู้ใช้งานระบบ</text>
    <rect x="610" y="596" width="170" height="28" rx="8" fill="#fff" stroke="#e3e8ef"/><text x="695"  y="614" fill="#1e3a5f">บทบาท / สิทธิ์</text>
