<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Noto Sans Thai','Segoe UI','Sarabun',sans-serif">
  <defs>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#16243a" flood-opacity="0.14"/>
