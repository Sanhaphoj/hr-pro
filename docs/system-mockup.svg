    <rect x="206" y="168" width="174" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="214" y="185" fill="#8a94a6" font-size="10">you@company.com</text>
    <text x="206" y="214" fill="#5b6675" font-size="10" font-weight="600">รหัสผ่าน</text>
